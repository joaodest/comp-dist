syntax = "proto3";
package match;
option go_package = "voxel-royale/gen/match";
import "google/api/annotations.proto";

service GameService {
    // Stream bidirecional para gameplay em tempo real
    rpc StreamMatch(stream PlayerInput) returns (stream GameState);
}

message PlayerInput {
    string player_id = 1;
    float move_x = 2;
    float move_y = 3;
    bool is_attacking = 4;
}

message GameState {
    int64 tick = 1;
    repeated PlayerSnapshot players = 2;
}

message PlayerSnapshot {
    string player_id = 1;
    float x = 2;
    float y = 3;
    bool is_alive = 4;
}